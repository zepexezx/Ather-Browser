<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Minimal Browser</title>
        <link rel="stylesheet" href="/src/style.css" />
    </head>
    <body>
        <div class="app-container">
            <div class="top-bar" data-tauri-drag-region></div>

            <div class="empty-screen" id="empty-screen">
                <div class="time-widget">
                    <div class="time-text" id="clock-display">00:00</div>
                    <div class="date-text" id="date-display">...</div>
                </div>

                <div class="empty-hint">
                    search anything you want by clicking
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    in the bottom
                </div>
            </div>

            <div id="history-overlay" class="hidden">
                <div class="history-grid">
                    <div class="history-col" id="hist-col-0">
                        <div class="hist-header">
                            <span class="h-title">Today</span
                            ><span class="h-date"></span>
                        </div>
                        <div class="hist-content"></div>
                    </div>
                    <div class="history-col" id="hist-col-1">
                        <div class="hist-header">
                            <span class="h-title">Yesterday</span
                            ><span class="h-date"></span>
                        </div>
                        <div class="hist-content"></div>
                    </div>
                    <div class="history-col" id="hist-col-2">
                        <div class="hist-header">
                            <span class="h-title">2-4 days ago</span
                            ><span class="h-date"></span>
                        </div>
                        <div class="hist-content"></div>
                    </div>
                    <div class="history-col" id="hist-col-3">
                        <div class="hist-header">
                            <span class="h-title">5-7 days ago</span
                            ><span class="h-date"></span>
                        </div>
                        <div class="hist-content"></div>
                    </div>
                </div>
            </div>

            <div class="bottom-bar-wrapper">
                <header class="capsule-bar">
                    <div class="nav-group">
                        <button class="icon-btn" id="btn-back" title="Назад">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <button
                            class="icon-btn"
                            id="btn-forward"
                            title="Вперед"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>

                    <div class="search-capsule">
                        <input
                            type="text"
                            id="search-input"
                            placeholder="search"
                            autocomplete="off"
                            spellcheck="false"
                        />
                    </div>

                    <div class="action-buttons">
                        <div class="fav-wrapper">
                            <button
                                class="icon-btn fav-btn"
                                id="btn-fav"
                                title="Избранное"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <polygon
                                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                                    ></polygon>
                                </svg>
                            </button>
                            <div class="fav-panel" id="fav-panel"></div>
                        </div>

                        <div class="history-wrapper">
                            <button
                                class="icon-btn"
                                id="btn-history"
                                title="История"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline
                                        points="12 6 12 12 16 14"
                                    ></polyline>
                                </svg>
                            </button>
                        </div>

                        <button
                            class="icon-btn"
                            id="btn-force-fs"
                            title="Cinema"
                            style="display: none !important;">
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="square"
                                stroke-linejoin="miter"
                            >
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <polyline points="9 21 3 21 3 15"></polyline>
                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                <line x1="3" y1="21" x2="10" y2="14"></line>
                            </svg>
                        </button.>

                        <div class="settings-wrapper">
                            <button
                                class="icon-btn"
                                id="btn-settings"
                                title="Настройки"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path
                                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                                    ></path>
                                </svg>
                            </button>

                            <div
                                class="settings-container"
                                id="settings-container"
                            >
                                <div class="settings-capsule">
                                    <select
                                        id="search-engine-select"
                                        class="minimal-select"
                                    >
                                        <option value="google">Google</option>
                                        <option value="duckduckgo">
                                            DuckDuckGo
                                        </option>
                                        <option value="bing">Bing</option>
                                        <option value="yandex">Yandex</option>
                                    </select>
                                </div>

                                <label
                                    class="settings-capsule start-page-capsule"
                                >
                                    <span class="settings-label"
                                        >Start page</span
                                    >
                                    <input
                                        type="text"
                                        id="start-page-input"
                                        class="minimal-input"
                                        placeholder="https://"
                                        autocomplete="off"
                                        spellcheck="false"
                                    />
                                </label>

                                <button
                                    class="theme-toggle-btn"
                                    id="theme-toggle-btn"
                                    title="Сменить тему"
                                ></button>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="tabs-wrapper">
                        <button class="scroll-arrow left" id="scroll-left">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <div class="tabs-container" id="tabs-container"></div>
                        <button class="scroll-arrow right" id="scroll-right">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </header>
            </div>
        </div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
